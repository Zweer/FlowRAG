name: 🐛 Bug Report
description: Report a bug in FlowRAG
labels: ["bug"]
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@flowrag/pipeline"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "1.8.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "24.0.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
