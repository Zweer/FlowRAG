pre-commit:
  piped: true
  commands:
    biome:
      glob: "*.{ts,json,yaml,md,css,html}"
      run: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
      priority: 1
    package-lint:
      glob: "package.json"
      run: npx npmPkgJsonLint .
      priority: 1
    package-sort:
      glob: "package.json"
      run: npx sort-package-json "package.json" "packages/*/package.json"
      stage_fixed: true
      priority: 1
    lockfile-sync:
      glob: "{package.json,packages/*/package.json}"
      run: |
        if command -v nvm &>/dev/null || [ -s "$NVM_DIR/nvm.sh" ]; then
          source "$NVM_DIR/nvm.sh" 2>/dev/null
          nvm exec 22 npm i --package-lock-only --ignore-scripts 2>/dev/null
        else
          echo "⚠️  nvm not found — skipping lockfile sync (CI will catch incompatibilities)"
        fi
      stage_fixed: true
      priority: 2
    lockfile:
      glob: "package-lock.json"
      run: npx lockfile-lint
      priority: 3
    build:
      glob: "*.ts"
      run: npm run build
      priority: 3
    typecheck:
      glob: "*.ts"
      run: npm run lint:typecheck
      priority: 4
    test:
      glob: "*.ts"
      run: npx vitest run --reporter=dot
      priority: 4

commit-msg:
  commands:
    commitlint:
      run: npx --no -- commitlint --edit {1}
